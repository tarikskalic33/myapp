name: AEGIS-Ω CI
on:
  push:
    branches: [main, 'claude/*']
  pull_request:
    branches: [main]

jobs:
  ts-gate8:
    name: TypeScript Gate 8 (2733 tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sovereign-omega-v2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sovereign-omega-v2/package-lock.json
      - run: npm ci
      - name: Gate 1 - JCS
        run: npm run test -- test/unit/jcs.test.ts
      - name: Gate 8 - Full suite
        run: npm run test && npm run typecheck && npm run build

  commercial-builds:
    name: Commercial Products Build (${{ matrix.product }})
    runs-on: ubuntu-latest
    needs: [ts-gate8]
    strategy:
      fail-fast: false
      matrix:
        product: [cockpit, hub, platform-picker, hook-generator, content-calendar]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            packages/shared/package-lock.json
            ${{ matrix.product }}/package-lock.json
      - name: Install shared packages
        run: cd packages/shared && npm ci
      - name: Build ${{ matrix.product }}
        run: cd ${{ matrix.product }} && npm ci && npm run build
