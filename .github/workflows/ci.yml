# ─────────────────────────────────────────────────────────────────────────────
#  AEGIS-Ω Constitutional Automaton
#
#  Root constitutional law:  AdaptivePower(T) ≤ ReplayVerifiability(T)
#  BFT quorum threshold:     1/φ = (√5−1)/2 ≈ 0.618
#  Martingale condition:     E[S_{n+1}|Fₙ] = Sₙ
#
#  Execution order mirrors the epistemic scale hierarchy:
#
#    SUBATOMIC  →  verify frozen constitutional membrane        [T0]
#    ATOMIC     →  Rust inference gates (CL-Ψ) + runtime       [T0/T2]
#    MOLECULAR  →  TypeScript Gate 8 — governance runtime       [T1]
#    CELLULAR   →  Studio observability build                   [T2]
#    ORGANISM   →  Python bridge smoke (quick)                  [T2]
#    FIELD      →  Creator Toolkit (4 products in parallel)     [T2]
#    CEREMONY   →  BFT quorum assertion + martingale verdict    [T1]
#
#  A T0 failure at any scale propagates upward and halts everything above it.
# ─────────────────────────────────────────────────────────────────────────────

name: ⊕ AEGIS-Ω Constitutional Automaton

on:
  push:
    branches: [main, 'claude/*']
  pull_request:
    branches: [main, 'claude/aegis-setup-Lx7Ji', 'claude/test-coverage-analysis-F50Hf']
  workflow_dispatch:

concurrency:
  group: automaton-${{ github.ref }}
  cancel-in-progress: true

# ── SUBATOMIC — Constitutional membrane ──────────────────────────────────────
jobs:
  membrane:
    name: ⊕ SUBATOMIC · Constitutional Membrane [T0]
    runs-on: ubuntu-latest
    outputs:
      t0_verdict: ${{ steps.verify.outputs.t0_verdict }}
      corruption_count: ${{ steps.verify.outputs.corruption_count }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: sovereign-omega-v2/package-lock.json

      - name: Install (scripts only — no build)
        run: cd sovereign-omega-v2 && npm ci --ignore-scripts

      - name: Verify frozen file hashes
        id: verify
        run: |
          cd sovereign-omega-v2
          if node scripts/verify-hashes.mjs; then
            echo "t0_verdict=true"  >> "$GITHUB_OUTPUT"
            echo "corruption_count=0" >> "$GITHUB_OUTPUT"
            echo "✓ membrane intact — t0_verdict=true  corruption_count=0"
          else
            echo "t0_verdict=false"  >> "$GITHUB_OUTPUT"
            echo "corruption_count=1" >> "$GITHUB_OUTPUT"
            echo "✗ T0_ABORT — frozen file hash mismatch" >&2
            exit 1
          fi

# ── ATOMIC — Rust inference crates ───────────────────────────────────────────
  cl-psi:
    name: ⊗ ATOMIC · CL-Ψ Inference Gates [T0]
    runs-on: ubuntu-latest
    needs: membrane
    outputs:
      gates_passed: ${{ steps.run.outputs.passed }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: aegis-cl-psi -> target
          save-if: "true"

      - name: Run gate suite (never --all-features)
        id: run
        env:
          CARGO_INCREMENTAL: "0"
          CARGO_NET_RETRY: "3"
          RUSTFLAGS: "-C opt-level=0"
        run: |
          set -eo pipefail
          cd aegis-cl-psi
          echo "Rust: $(rustc --version)  Mem: $(free -m | awk '/^Mem/{print $2}')MB  Disk: $(df -h . | awk 'NR==2{print $4}') free"
          cargo test --jobs 1 -- --test-threads 1 2>&1 | tee /tmp/cl-psi.txt || {
            echo "=== CARGO TEST FAILED — last 80 lines ===" >&2
            tail -80 /tmp/cl-psi.txt >&2
            exit 1
          }
          PASSED=$(grep -oP '\d+ passed' /tmp/cl-psi.txt \
            | grep -oP '\d+' | awk '{s+=$1} END {print s+0}')
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "✓ CL-Ψ: $PASSED tests passed"
          test "$PASSED" -ge 6800

  runtime:
    name: ⊗ ATOMIC · Seven-Pillar Runtime [T2]
    runs-on: ubuntu-latest
    needs: membrane
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: aegis-runtime -> target

      - name: Build + test
        run: cd aegis-runtime && cargo build && cargo test

# ── MOLECULAR — TypeScript governance runtime ─────────────────────────────────
  gate8:
    name: ⊕ MOLECULAR · TypeScript Gate 8 [T1]
    runs-on: ubuntu-latest
    needs: [cl-psi, runtime]
    defaults:
      run:
        working-directory: sovereign-omega-v2
    outputs:
      ts_tests: ${{ steps.suite.outputs.ts_tests }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: sovereign-omega-v2/package-lock.json

      - run: npm ci

      - name: Gate 1 — JCS canonicalization (T0 anchor)
        run: npm run test -- test/unit/jcs.test.ts

      - name: Gate 8 — Full suite + typecheck + build
        id: suite
        run: |
          npm run test -- --reporter=verbose 2>&1 | tee /tmp/ts-results.txt
          npm run typecheck
          npm run build
          PASSED=$(grep -oP '\d+ passed' /tmp/ts-results.txt \
            | tail -1 | grep -oP '\d+' | head -1)
          echo "ts_tests=${PASSED:-unknown}" >> "$GITHUB_OUTPUT"
          echo "✓ TypeScript Gate 8 passed"

# ── CELLULAR — Observability studio ──────────────────────────────────────────
  studio:
    name: ◈ CELLULAR · Observability Studio [T2]
    runs-on: ubuntu-latest
    needs: gate8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: studio/package-lock.json

      - name: Build studio
        run: cd studio && npm ci && npm run build

# ── FIELD — Creator Toolkit (4 products, fully parallel) ─────────────────────
  toolkit:
    name: ⊞ FIELD · ${{ matrix.product }} [T2]
    runs-on: ubuntu-latest
    needs: gate8
    strategy:
      fail-fast: false
      matrix:
        product: [hub, platform-picker, hook-generator, content-calendar]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ${{ matrix.product }}/package-lock.json

      - name: Build ${{ matrix.product }}
        run: |
          cd "${{ matrix.product }}"
          npm ci
          npm run build
          echo "✓ ${{ matrix.product }} production build complete"

# ── BFT CEREMONY — Quorum assertion + martingale verdict ─────────────────────
  ceremony:
    name: ⊛ CEREMONY · BFT Quorum + Martingale Verdict [T1]
    runs-on: ubuntu-latest
    needs: [membrane, cl-psi, runtime, gate8, studio, toolkit]
    if: always()
    steps:
      - name: Assert 1/φ quorum and issue constitutional verdict
        env:
          R_MEMBRANE:  ${{ needs.membrane.result }}
          R_CL_PSI:    ${{ needs.cl-psi.result }}
          R_RUNTIME:   ${{ needs.runtime.result }}
          R_GATE8:     ${{ needs.gate8.result }}
          R_STUDIO:    ${{ needs.studio.result }}
          R_TOOLKIT:   ${{ needs.toolkit.result }}
          T0_VERDICT:  ${{ needs.membrane.outputs.t0_verdict }}
          CORRUPT:     ${{ needs.membrane.outputs.corruption_count }}
          CL_PSI_GATES: ${{ needs.cl-psi.outputs.gates_passed }}
          TS_TESTS:    ${{ needs.gate8.outputs.ts_tests }}
          PHI_INV:     "0.6180339887"
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "   AEGIS-Ω  ·  Constitutional Ceremony"
          echo "   AdaptivePower(T) ≤ ReplayVerifiability(T)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "   Layer         Job              Result      Tier"
          echo "   ────────────  ───────────────  ──────────  ────"
          printf "   SUBATOMIC     membrane         %-10s  T0\n"  "$R_MEMBRANE"
          printf "   ATOMIC/CL-Ψ  inference-gates  %-10s  T0   (%s tests)\n" "$R_CL_PSI"  "$CL_PSI_GATES"
          printf "   ATOMIC/RT     runtime          %-10s  T2\n"  "$R_RUNTIME"
          printf "   MOLECULAR     gate8            %-10s  T1   (%s tests)\n" "$R_GATE8" "$TS_TESTS"
          printf "   CELLULAR      studio           %-10s  T2\n"  "$R_STUDIO"
          printf "   FIELD         toolkit          %-10s  T2\n"  "$R_TOOLKIT"
          echo ""

          # ── T0 hard gate ──────────────────────────────────────────────
          if [[ "$T0_VERDICT" != "true" || "$CORRUPT" != "0" ]]; then
            echo "   ✗ T0_ABORT"
            echo "   Constitutional membrane violated — corruption_count=$CORRUPT"
            echo "   Mutation authority SUSPENDED"
            echo ""
            exit 1
          fi

          # ── BFT quorum (1/φ threshold) ────────────────────────────────
          PASS=0
          TOTAL=6
          [[ "$R_MEMBRANE" == "success" ]] && PASS=$((PASS+1))
          [[ "$R_CL_PSI"   == "success" ]] && PASS=$((PASS+1))
          [[ "$R_RUNTIME"  == "success" ]] && PASS=$((PASS+1))
          [[ "$R_GATE8"    == "success" ]] && PASS=$((PASS+1))
          [[ "$R_STUDIO"   == "success" ]] && PASS=$((PASS+1))
          [[ "$R_TOOLKIT"  == "success" ]] && PASS=$((PASS+1))

          RATIO=$(awk "BEGIN { printf \"%.4f\", $PASS/$TOTAL }")
          QUORUM=$(awk "BEGIN { print ($RATIO >= $PHI_INV) ? 1 : 0 }")

          echo "   BFT quorum:  $PASS/$TOTAL  (ratio=$RATIO  threshold=1/φ=$PHI_INV)"
          echo ""

          if [[ "$QUORUM" == "1" ]]; then
            echo "   ✓ CONSTITUTIONAL: PERMIT"
            echo "   entropy_bounded=true"
            echo "   martingale ANCHORED"
            echo "   mutation authority ACTIVE"
          else
            echo "   ✗ CONSTITUTIONAL: DENY"
            echo "   entropy_bounded=false"
            echo "   martingale SUSPENDED"
            echo "   quorum below 1/φ — $PASS/$TOTAL votes insufficient"
            exit 1
          fi

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
