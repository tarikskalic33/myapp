name: AEGIS-Ω CI
on:
  push:
    branches: [main, 'claude/*']
  pull_request:
    branches: [main]

jobs:
  rust-gates:
    name: Rust Gates (1798 tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            aegis-cl-psi -> target
            aegis-runtime -> target
      - name: aegis-cl-psi tests
        run: |
          set -eo pipefail
          cd aegis-cl-psi
          cargo test 2>&1 | tee /tmp/rust-results.txt
      - name: Verify minimum test count
        run: |
          PASSED=$(grep -oP '\d+ passed' /tmp/rust-results.txt | grep -oP '\d+' | awk '{s+=$1} END {print s+0}')
          echo "Rust tests passed: $PASSED"
          test "$PASSED" -ge 1750
      - name: aegis-runtime build
        run: cd aegis-runtime && cargo build
      - name: aegis-runtime tests
        run: cd aegis-runtime && cargo test

  ts-gate8:
    name: TypeScript Gate 8 (2790 tests)
    runs-on: ubuntu-latest
    needs: rust-gates
    defaults:
      run:
        working-directory: sovereign-omega-v2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sovereign-omega-v2/package-lock.json
      - run: npm ci
      - name: Gate 1 - JCS
        run: npm run test -- test/unit/jcs.test.ts
      - name: Gate 8 - Full suite
        run: npm run test && npm run typecheck && npm run build

  commercial-builds:
    name: Commercial Products Build (${{ matrix.product }})
    runs-on: ubuntu-latest
    needs: ts-gate8
    strategy:
      fail-fast: false
      matrix:
        product: [cockpit, hub, platform-picker, hook-generator, content-calendar]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.product }}/package-lock.json
      - name: Build ${{ matrix.product }}
        run: cd ${{ matrix.product }} && npm ci && npm run build
