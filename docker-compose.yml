# AEGIS Ω — Production Docker Compose
# Runs the full governance runtime stack.
# Epistemic Tier: T1 — infrastructure substrate.
#
# Usage:
#   cp .env.example .env  # add your keys
#   docker compose up -d
#   docker compose logs -f bridge
#
# The checkpoint volume survives container restarts — governance state is durable.

version: '3.9'

services:

  # Python governance bridge — Layer B runtime
  bridge:
    build:
      context: ./sovereign-omega-v2
      dockerfile: Dockerfile
      target: runtime
    container_name: aegis-bridge
    restart: unless-stopped
    ports:
      - "7890:7890"
    env_file:
      - ./.env
    environment:
      SOVEREIGN_BRIDGE_PORT: "${SOVEREIGN_BRIDGE_PORT:-7890}"
      AEGIS_CHECKPOINT_PATH: "${AEGIS_CHECKPOINT_PATH:-/app/data/aegis_checkpoint.json}"
    volumes:
      # Persisted checkpoint — governance state survives restarts
      - bridge-checkpoint:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7890/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Studio — constitutional observability (projection only, no authority)
  studio:
    build:
      context: ./studio
      dockerfile: Dockerfile
    container_name: aegis-studio
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      bridge:
        condition: service_healthy
    environment:
      VITE_BRIDGE_URL: "http://bridge:7890"

  # Cockpit — AI chat UI with governance telemetry
  cockpit:
    build:
      context: ./cockpit
      dockerfile: Dockerfile
    container_name: aegis-cockpit
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      bridge:
        condition: service_healthy
    env_file:
      - ./.env

volumes:
  bridge-checkpoint:
    driver: local
